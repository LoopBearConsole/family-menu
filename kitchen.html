<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>老刘小炒 · 厨房看板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .font-display { font-family: 'Noto Serif SC', serif; }
    body { background: #f4f1ec; }
    .img-ph { background: linear-gradient(135deg, #fed7aa, #fb923c); }
    .sheet-mask { opacity: 0; pointer-events: none; transition: opacity .25s; }
    .sheet-mask.open { opacity: 1; pointer-events: auto; }
    .sheet-panel { transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1); }
    .sheet-mask.open .sheet-panel { transform: translateY(0); }
    @media (min-width: 640px) {
      .sheet-panel { transform: scale(.95); opacity: 0; transition: .28s ease; }
      .sheet-mask.open .sheet-panel { transform: scale(1); opacity: 1; }
    }
    @keyframes pulseDot {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }
    .live-dot { animation: pulseDot 1.4s ease infinite; }
    .safe-bottom { padding-bottom: max(16px, env(safe-area-inset-bottom)); }
  </style>
</head>
<body class="min-h-screen text-stone-800 pb-8">

  <header class="bg-gradient-to-br from-emerald-600 via-teal-600 to-cyan-700 text-white">
    <div class="max-w-3xl mx-auto px-4 pt-10 pb-12 text-center">
      <p class="text-emerald-100 text-xs tracking-[0.2em] mb-2">KITCHEN · 厨房看板</p>
      <h1 class="font-display text-3xl sm:text-4xl font-bold mb-2">老刘小炒</h1>
      <p class="text-emerald-50/90 text-sm">客厅下单后，这里自动出现 · 点菜看做法</p>
      <div class="mt-4 flex flex-wrap items-center justify-center gap-2 text-xs">
        <span class="inline-flex items-center gap-1.5 bg-white/15 px-3 py-1.5 rounded-full">
          <span class="w-2 h-2 rounded-full bg-lime-300 live-dot"></span>
          <span id="syncLabel">同步中…</span>
        </span>
        <span id="orderCount" class="bg-white/15 px-3 py-1.5 rounded-full">0 单待处理</span>
      </div>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-3 -mt-5 relative z-10">
    <div class="bg-white rounded-2xl shadow-md border border-emerald-50 p-3 flex flex-wrap gap-2 justify-between items-center">
      <div class="flex gap-2">
        <button type="button" data-filter="active" class="filter-btn active px-3 py-1.5 rounded-full text-sm font-medium bg-emerald-600 text-white">进行中</button>
        <button type="button" data-filter="all" class="filter-btn px-3 py-1.5 rounded-full text-sm font-medium bg-stone-100 text-stone-600">全部</button>
        <button type="button" data-filter="done" class="filter-btn px-3 py-1.5 rounded-full text-sm font-medium bg-stone-100 text-stone-600">已完成</button>
      </div>
      <div class="flex gap-2">
        <button type="button" onclick="refreshBoard(true)" class="text-sm px-3 py-1.5 rounded-full border border-stone-200 text-stone-600 hover:bg-stone-50">刷新</button>
        <button type="button" onclick="clearDone()" class="text-sm px-3 py-1.5 rounded-full border border-stone-200 text-stone-500 hover:text-red-500">清理已完成</button>
      </div>
    </div>
  </div>

  <main class="max-w-3xl mx-auto px-3 mt-4 space-y-4" id="orderList"></main>

  <div id="emptyState" class="max-w-3xl mx-auto px-4 py-16 text-center text-stone-400 hidden">
    <p class="text-5xl mb-3">👩‍🍳</p>
    <p class="font-medium text-stone-500">还没有新订单</p>
    <p class="text-sm mt-1">客厅扫码点菜并下单后，会自动出现在这里</p>
  </div>

  <!-- 菜品做法详情 -->
  <div id="detailMask" class="sheet-mask fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4" onclick="closeDetail(event)">
    <div class="sheet-panel bg-white w-full sm:max-w-lg sm:rounded-3xl rounded-t-3xl max-h-[92vh] overflow-y-auto shadow-2xl" onclick="event.stopPropagation()">
      <div class="relative">
        <img id="kImg" src="" alt="" class="w-full h-48 object-cover img-ph" referrerpolicy="no-referrer" />
        <button type="button" onclick="closeDetailDirect()" class="absolute top-3 right-3 w-9 h-9 rounded-full bg-black/45 text-white text-xl">&times;</button>
        <span id="kTime" class="absolute bottom-3 left-3 px-2.5 py-1 rounded-full text-xs bg-black/50 text-white"></span>
      </div>
      <div class="p-5 sm:p-6">
        <h2 id="kName" class="font-display text-2xl font-bold mb-1"></h2>
        <p id="kTag" class="text-sm text-emerald-700 font-medium mb-3"></p>
        <div class="mb-4">
          <p class="text-xs font-semibold text-stone-500 mb-2">主要食材</p>
          <div id="kIng" class="flex flex-wrap gap-1.5"></div>
        </div>
        <div class="mb-4">
          <p class="text-xs font-semibold text-stone-500 mb-2">制作步骤</p>
          <ol id="kSteps" class="space-y-2"></ol>
        </div>
        <div class="bg-amber-50 rounded-2xl p-3 text-sm text-stone-600">
          <span class="font-semibold text-amber-700">小贴士：</span>
          <span id="kTip"></span>
        </div>
        <button type="button" onclick="closeDetailDirect()" class="mt-5 w-full bg-emerald-600 text-white font-bold py-3 rounded-xl">知道了</button>
      </div>
    </div>
  </div>

  <footer class="text-center text-stone-400 text-xs mt-10 safe-bottom">
    <p>老刘小炒 · 厨房看板 · 每 5 秒自动同步</p>
    <p class="mt-1"><a href="./" class="text-emerald-600 underline">返回客厅点餐页</a></p>
  </footer>

  <script src="shared.js"></script>
  <script>
    let board = { orders: [], updatedAt: null };
    let filter = 'active';
    let lastSig = '';
    let knownIds = new Set();

    const statusLabel = {
      pending: '待做',
      cooking: '制作中',
      done: '已完成'
    };
    const statusClass = {
      pending: 'bg-orange-100 text-orange-700',
      cooking: 'bg-sky-100 text-sky-700',
      done: 'bg-stone-200 text-stone-500'
    };

    function showToast(msg) {
      let t = document.getElementById('toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'toast';
        t.className = 'fixed left-1/2 -translate-x-1/2 bottom-8 z-[80] pointer-events-none';
        document.body.appendChild(t);
      }
      t.innerHTML = `<div class="bg-stone-900 text-white text-sm px-5 py-2.5 rounded-full shadow-lg">${msg}</div>`;
      setTimeout(() => { t.innerHTML = ''; }, 2000);
    }

    function orderSignature(orders) {
      return (orders || []).map(o => o.id + ':' + o.status).join('|');
    }

    function filteredOrders() {
      const list = board.orders || [];
      if (filter === 'active') return list.filter(o => o.status !== 'done');
      if (filter === 'done') return list.filter(o => o.status === 'done');
      return list;
    }

    function render() {
      const list = filteredOrders();
      const root = document.getElementById('orderList');
      const empty = document.getElementById('emptyState');
      const activeCount = (board.orders || []).filter(o => o.status !== 'done').length;
      document.getElementById('orderCount').textContent = activeCount + ' 单待处理';

      if (!list.length) {
        root.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      root.innerHTML = list.map(order => {
        const items = order.items || [];
        return `
          <section class="bg-white rounded-2xl shadow-sm border border-stone-100 overflow-hidden">
            <div class="px-4 py-3 border-b border-stone-50 flex items-center justify-between gap-2">
              <div>
                <p class="text-xs text-stone-400">${order.time || ''}</p>
                <p class="font-bold text-stone-800 mt-0.5">订单 · ${items.reduce((s,i)=>s+(i.qty||0),0)} 份</p>
              </div>
              <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${statusClass[order.status] || statusClass.pending}">${statusLabel[order.status] || order.status}</span>
            </div>
            <div class="divide-y divide-stone-50">
              ${items.map(item => {
                const d = findDish(item.id) || {};
                return `
                  <button type="button" onclick="openDish('${item.id}')"
                    class="w-full flex items-center gap-3 p-3 text-left hover:bg-emerald-50/50 active:bg-emerald-50 transition">
                    <img src="${imgOf(item.id)}" alt="" class="w-14 h-14 rounded-xl object-cover img-ph shrink-0"
                      referrerpolicy="no-referrer" onerror="onImgError(this,'${item.id}')" />
                    <div class="flex-1 min-w-0">
                      <p class="font-semibold text-stone-800">${item.name || d.name || item.id}
                        <span class="text-emerald-600">×${item.qty || 1}</span>
                      </p>
                      <p class="text-xs text-stone-400 mt-0.5 truncate">${d.tagline || '点开看制作步骤'}</p>
                      <p class="text-[11px] text-stone-400">约 ${d.time || '?'} 分钟 · 点此看做法</p>
                    </div>
                    <span class="text-stone-300 text-lg">›</span>
                  </button>`;
              }).join('')}
            </div>
            <div class="px-3 py-3 bg-stone-50 flex flex-wrap gap-2">
              ${order.status === 'pending' ? `<button type="button" onclick="setStatus('${order.id}','cooking')" class="flex-1 min-w-[100px] bg-sky-600 text-white text-sm font-bold py-2.5 rounded-xl">开始做</button>` : ''}
              ${order.status === 'cooking' ? `<button type="button" onclick="setStatus('${order.id}','done')" class="flex-1 min-w-[100px] bg-emerald-600 text-white text-sm font-bold py-2.5 rounded-xl">做完了</button>` : ''}
              ${order.status === 'done' ? `<button type="button" onclick="setStatus('${order.id}','pending')" class="flex-1 min-w-[100px] border border-stone-300 text-stone-600 text-sm font-medium py-2.5 rounded-xl">重新打开</button>` : ''}
              ${order.status !== 'done' ? `<button type="button" onclick="setStatus('${order.id}','done')" class="px-4 py-2.5 rounded-xl border border-stone-200 text-sm text-stone-500">标为完成</button>` : ''}
            </div>
          </section>`;
      }).join('');
    }

    async function refreshBoard(manual) {
      const label = document.getElementById('syncLabel');
      try {
        if (manual) label.textContent = '刷新中…';
        const data = await fetchOrderBoard();
        const sig = orderSignature(data.orders);
        const isNew = lastSig && sig !== lastSig;
        // detect brand-new order ids
        const incoming = (data.orders || []).map(o => o.id);
        const brandNew = incoming.filter(id => lastSig && !knownIds.has(id));
        board = data;
        lastSig = sig;
        knownIds = new Set(incoming);
        const t = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('zh-CN') : '';
        label.textContent = t ? ('已同步 ' + t) : '已同步';
        render();
        if (brandNew.length) {
          showToast('有新订单！');
          if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
        } else if (manual) {
          showToast('已刷新');
        }
      } catch (e) {
        console.error(e);
        label.textContent = '同步失败，重试中';
        if (manual) showToast('同步失败，请检查网络');
      }
    }

    async function setStatus(orderId, status) {
      try {
        board = await updateKitchenOrderStatus(orderId, status);
        lastSig = orderSignature(board.orders);
        render();
        showToast(statusLabel[status] || '已更新');
      } catch (e) {
        showToast('更新失败');
      }
    }

    async function clearDone() {
      try {
        board = await clearDoneKitchenOrders();
        lastSig = orderSignature(board.orders);
        knownIds = new Set((board.orders || []).map(o => o.id));
        render();
        showToast('已清理完成订单');
      } catch (e) {
        showToast('清理失败');
      }
    }

    function openDish(id) {
      const d = findDish(id);
      if (!d) { showToast('找不到这道菜的资料'); return; }
      const img = document.getElementById('kImg');
      img.style.display = '';
      img.dataset.fb = '0';
      img.alt = d.name;
      img.onerror = function () { onImgError(this, d.id); };
      img.src = imgOf(d.id);
      document.getElementById('kName').textContent = d.name;
      document.getElementById('kTag').textContent = d.tagline || '';
      document.getElementById('kTime').textContent = '约 ' + d.time + ' 分钟';
      document.getElementById('kTip').textContent = d.tip || '按步骤慢慢做就好';
      document.getElementById('kIng').innerHTML = (d.ingredients || [])
        .map(x => `<span class="px-2.5 py-1 rounded-lg bg-emerald-50 text-xs text-stone-600 border border-emerald-100">${x}</span>`).join('');
      const steps = dishSteps(d);
      document.getElementById('kSteps').innerHTML = steps.map((s, i) => `
        <li class="flex gap-3 text-sm text-stone-700 leading-relaxed">
          <span class="shrink-0 w-6 h-6 rounded-full bg-emerald-600 text-white text-xs font-bold flex items-center justify-center">${i + 1}</span>
          <span class="pt-0.5">${s}</span>
        </li>`).join('') || '<li class="text-sm text-stone-400">暂无分步说明</li>';
      document.getElementById('detailMask').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail(e) {
      if (e.target === document.getElementById('detailMask')) closeDetailDirect();
    }
    function closeDetailDirect() {
      document.getElementById('detailMask').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active', 'bg-emerald-600', 'text-white');
          b.classList.add('bg-stone-100', 'text-stone-600');
        });
        btn.classList.add('active', 'bg-emerald-600', 'text-white');
        btn.classList.remove('bg-stone-100', 'text-stone-600');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetailDirect();
    });

    refreshBoard();
    setInterval(() => refreshBoard(false), 5000);
  </script>
</body>
</html>
