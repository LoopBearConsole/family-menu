<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#059669" />
  <title>老刘小炒 · 厨房看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: #f4f1ec; color: #292524; min-height: 100vh; padding-bottom: 24px;
    }
    .header {
      background: linear-gradient(135deg, #059669, #0d9488, #0e7490);
      color: #fff; text-align: center; padding: 36px 16px 48px;
    }
    .header .sub { font-size: 11px; letter-spacing: .2em; opacity: .9; margin-bottom: 6px; }
    .header h1 { font-size: 1.75rem; margin-bottom: 6px; }
    .header p { font-size: 13px; opacity: .92; }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 14px; }
    .pills span {
      background: rgba(255,255,255,.15); padding: 6px 12px; border-radius: 999px; font-size: 12px;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: #bef264; animation: pulse 1.4s ease infinite; }
    @keyframes pulse { 50% { opacity: .35; } }

    .toolbar {
      max-width: 720px; margin: -20px auto 0; padding: 0 12px; position: relative; z-index: 2;
    }
    .toolbar-inner {
      background: #fff; border-radius: 14px; padding: 10px;
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
    }
    .filters { display: flex; gap: 6px; }
    .filter-btn {
      border: 0; border-radius: 999px; padding: 7px 12px; font-size: 13px; font-weight: 600;
      background: #f5f5f4; color: #57534e;
    }
    .filter-btn.active { background: #059669; color: #fff; }
    .acts { display: flex; gap: 6px; }
    .acts button {
      border: 1px solid #e7e5e4; background: #fff; border-radius: 999px;
      padding: 7px 12px; font-size: 12px; color: #57534e;
    }

    main { max-width: 720px; margin: 14px auto 0; padding: 0 12px; display: flex; flex-direction: column; gap: 12px; }
    .empty { text-align: center; color: #a8a29e; padding: 50px 12px; }
    .empty .big { font-size: 40px; margin-bottom: 8px; }

    .order {
      background: #fff; border-radius: 16px; overflow: hidden;
      border: 1px solid #f5f5f4; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .order-hd {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; border-bottom: 1px solid #fafaf9;
    }
    .order-hd .t { font-size: 11px; color: #a8a29e; }
    .order-hd .n { font-weight: 700; margin-top: 2px; }
    .st {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 999px;
    }
    .st-pending { background: #ffedd5; color: #c2410c; }
    .st-cooking { background: #e0f2fe; color: #0369a1; }
    .st-done { background: #e7e5e4; color: #78716c; }

    .item {
      display: flex; gap: 10px; align-items: center; width: 100%;
      padding: 10px 12px; border: 0; background: #fff; text-align: left;
      border-bottom: 1px solid #fafaf9; cursor: pointer;
    }
    .item img {
      width: 52px; height: 52px; border-radius: 10px; object-fit: cover;
      background: linear-gradient(135deg, #a7f3d0, #34d399); flex-shrink: 0;
    }
    .item .meta { flex: 1; min-width: 0; }
    .item .meta .name { font-weight: 700; font-size: 14px; }
    .item .meta .sub { font-size: 11px; color: #a8a29e; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item .arrow { color: #d6d3d1; font-size: 18px; }

    .order-ft {
      padding: 10px 12px; background: #fafaf9; display: flex; flex-wrap: wrap; gap: 8px;
    }
    .order-ft button {
      flex: 1; min-width: 100px; border: 0; border-radius: 10px;
      padding: 10px; font-size: 13px; font-weight: 700; color: #fff;
    }
    .btn-cook { background: #0284c7; }
    .btn-done { background: #059669; }
    .btn-reopen { background: #fff; color: #57534e; border: 1px solid #d6d3d1 !important; }
    .btn-mark { background: #fff; color: #78716c; border: 1px solid #e7e5e4 !important; flex: 0 0 auto; padding: 10px 14px !important; font-weight: 500 !important; }

    .mask {
      position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,.5);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .mask.open { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; max-width: 520px; max-height: 92vh; overflow: auto;
      background: #fff; border-radius: 20px 20px 0 0;
      transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
    }
    .mask.open .sheet { transform: translateY(0); }
    .sheet-img { position: relative; height: 180px; background: linear-gradient(135deg,#a7f3d0,#34d399); }
    .sheet-img img { width: 100%; height: 100%; object-fit: cover; }
    .sheet-img .close {
      position: absolute; top: 10px; right: 10px; width: 34px; height: 34px;
      border: 0; border-radius: 999px; background: rgba(0,0,0,.45); color: #fff; font-size: 20px;
    }
    .sheet-img .time {
      position: absolute; left: 10px; bottom: 10px;
      background: rgba(0,0,0,.5); color: #fff; font-size: 11px; padding: 3px 8px; border-radius: 999px;
    }
    .sheet-body { padding: 16px 18px 24px; }
    .sheet-body h2 { font-size: 22px; margin-bottom: 4px; }
    .tagline { color: #047857; font-size: 13px; font-weight: 600; margin-bottom: 12px; }
    .box { margin-bottom: 14px; }
    .box h4 { font-size: 12px; color: #78716c; margin-bottom: 8px; }
    .ings { display: flex; flex-wrap: wrap; gap: 6px; }
    .ings span { background: #ecfdf5; border: 1px solid #a7f3d0; font-size: 12px; padding: 4px 8px; border-radius: 8px; }
    .steps { list-style: none; }
    .steps li { display: flex; gap: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 8px; color: #44403c; }
    .steps .n {
      flex-shrink: 0; width: 22px; height: 22px; border-radius: 999px;
      background: #059669; color: #fff; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .tip { background: #fffbeb; border-radius: 12px; padding: 10px; font-size: 13px; color: #57534e; }
    .okbtn {
      width: 100%; margin-top: 14px; border: 0; border-radius: 12px;
      background: #059669; color: #fff; font-weight: 700; padding: 12px;
    }
    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 80; pointer-events: none;
    }
    .toast div { background: #1c1917; color: #fff; font-size: 13px; padding: 10px 16px; border-radius: 999px; }
    footer { text-align: center; color: #a8a29e; font-size: 12px; margin-top: 28px; padding: 0 12px; }
    footer a { color: #059669; }
    .img-fallback {
      width: 52px; height: 52px; border-radius: 10px;
      background: linear-gradient(135deg,#a7f3d0,#34d399);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 18px; flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <p class="sub">KITCHEN · 厨房看板</p>
    <h1>老刘小炒</h1>
    <p>客厅下单后自动出现 · 点菜看做法</p>
    <div class="pills">
      <span><span class="dot"></span><span id="syncLabel">同步中…</span></span>
      <span id="orderCount">0 单待处理</span>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-inner">
      <div class="filters">
        <button type="button" class="filter-btn active" data-filter="active">进行中</button>
        <button type="button" class="filter-btn" data-filter="all">全部</button>
        <button type="button" class="filter-btn" data-filter="done">已完成</button>
      </div>
      <div class="acts">
        <button type="button" onclick="refreshBoard(true)">刷新</button>
        <button type="button" onclick="clearDone()">清理已完成</button>
      </div>
    </div>
  </div>

  <main id="orderList"></main>
  <div class="empty" id="emptyState" style="display:none">
    <div class="big">👩‍🍳</div>
    <div>还没有新订单</div>
    <div style="font-size:12px;margin-top:6px">客厅扫码点菜并下单后会出现在这里</div>
  </div>

  <div class="mask" id="detailMask" onclick="closeDetail(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <div class="sheet-img">
        <img id="kImg" alt="" />
        <button type="button" class="close" onclick="closeDetailDirect()">&times;</button>
        <span class="time" id="kTime"></span>
      </div>
      <div class="sheet-body">
        <h2 id="kName"></h2>
        <div class="tagline" id="kTag"></div>
        <div class="box"><h4>主要食材</h4><div class="ings" id="kIng"></div></div>
        <div class="box"><h4>制作步骤</h4><ol class="steps" id="kSteps"></ol></div>
        <div class="tip"><strong>小贴士：</strong><span id="kTip"></span></div>
        <button type="button" class="okbtn" onclick="closeDetailDirect()">知道了</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <footer>
    老刘小炒 · 厨房看板 · 每 3 秒自动同步<br />
    <a href="./">返回客厅点餐页</a>
  </footer>

  <!-- 本站脚本，带版本号，避免 CDN 旧缓存导致按钮失效 -->
  <script src="core.js?v=board3"></script>
  <script src="dishes-lite.js?v=board3"></script>
  <script>
    let board = { orders: [], updatedAt: null };
    let filter = 'active';
    let lastSig = '';
    let knownIds = new Set();
    let pollTimer = null;
    let refreshing = false;

    const statusLabel = { pending: '待做', cooking: '制作中', done: '已完成' };
    const statusClass = { pending: 'st-pending', cooking: 'st-cooking', done: 'st-done' };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerHTML = '<div>' + msg + '</div>';
      setTimeout(() => { t.innerHTML = ''; }, 2000);
    }

    function orderSignature(orders) {
      return (orders || []).map(o => o.id + ':' + (o.status || '')).join('|');
    }

    function filteredOrders() {
      const list = board.orders || [];
      if (filter === 'active') return list.filter(o => o.status !== 'done');
      if (filter === 'done') return list.filter(o => o.status === 'done');
      return list;
    }

    function render() {
      const list = filteredOrders();
      const root = document.getElementById('orderList');
      const empty = document.getElementById('emptyState');
      const activeCount = (board.orders || []).filter(o => o.status !== 'done').length;
      document.getElementById('orderCount').textContent = activeCount + ' 单待处理';

      if (!list.length) {
        root.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      root.innerHTML = list.map(order => {
        const items = order.items || [];
        const total = items.reduce((s, i) => s + (i.qty || 0), 0);
        return `<section class="order">
          <div class="order-hd">
            <div>
              <div class="t">${order.time || ''}</div>
              <div class="n">订单 · ${total} 份</div>
            </div>
            <span class="st ${statusClass[order.status] || 'st-pending'}">${statusLabel[order.status] || order.status}</span>
          </div>
          ${items.map(item => {
            const lite = (typeof findDishLite === 'function' ? findDishLite(item.id) : null) || {};
            return `<button type="button" class="item" onclick="openDish('${item.id}')">
              <img src="${imgOf(item.id, true)}" alt="" loading="eager" onerror="onImgError(this,'${item.id}',true)" />
              <div class="meta">
                <div class="name">${item.name || lite.name || item.id} <span style="color:#059669">×${item.qty || 1}</span></div>
                <div class="sub">${lite.tagline || '点开看制作步骤'} · 约 ${lite.time || item.time || '?'} 分钟</div>
              </div>
              <span class="arrow">›</span>
            </button>`;
          }).join('')}
          <div class="order-ft">
            ${order.status === 'pending' ? `<button type="button" class="btn-cook" onclick="setStatus('${order.id}','cooking')">开始做</button>` : ''}
            ${order.status === 'cooking' ? `<button type="button" class="btn-done" onclick="setStatus('${order.id}','done')">做完了</button>` : ''}
            ${order.status === 'done' ? `<button type="button" class="btn-reopen" onclick="setStatus('${order.id}','pending')">重新打开</button>` : ''}
            ${order.status !== 'done' ? `<button type="button" class="btn-mark" onclick="setStatus('${order.id}','done')">标为完成</button>` : ''}
          </div>
        </section>`;
      }).join('');
    }

    async function refreshBoard(manual) {
      if (refreshing && !manual) return;
      refreshing = true;
      const label = document.getElementById('syncLabel');
      try {
        if (manual) label.textContent = '刷新中…';
        const data = await fetchOrderBoard();
        const sig = orderSignature(data.orders);
        const incoming = (data.orders || []).map(o => o.id);
        const brandNew = incoming.filter(id => lastSig && !knownIds.has(id));
        const statusChanged = lastSig && sig !== lastSig;
        board = data;
        lastSig = sig;
        knownIds = new Set(incoming);
        const t = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('zh-CN') : '';
        label.textContent = t ? ('已同步 ' + t) : '已同步';
        render();
        if (brandNew.length) {
          showToast('有新订单！');
          if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
        } else if (manual) {
          showToast(statusChanged ? '已刷新' : '已是最新');
        }
      } catch (e) {
        console.error(e);
        // 远程失败时尝试展示本地缓存，避免空白
        try {
          if (typeof readLocalBoard === 'function') {
            const local = readLocalBoard();
            if (local && local.orders && local.orders.length) {
              board = local;
              render();
            }
          }
        } catch (e2) {}
        label.textContent = '网络不稳，自动重试中';
        if (manual) showToast('同步失败，请再点刷新');
      } finally {
        refreshing = false;
      }
    }

    async function setStatus(orderId, status) {
      // 乐观更新：先改界面，再后台同步
      const prev = board;
      try {
        board = {
          orders: (board.orders || []).map(function (o) {
            return o.id === orderId ? Object.assign({}, o, { status: status }) : o;
          }),
          updatedAt: new Date().toISOString(),
        };
        lastSig = orderSignature(board.orders);
        render();
        showToast(statusLabel[status] || '已更新');

        const remote = await updateKitchenOrderStatus(orderId, status);
        board = remote;
        lastSig = orderSignature(board.orders);
        if (remote && remote._remoteOk === false) {
          showToast('已改状态，云端稍后再同步');
        }
        render();
      } catch (e) {
        console.error(e);
        // 即使远程失败，本地已改；尝试写本地
        try {
          if (typeof writeLocalBoard === 'function') writeLocalBoard(board);
        } catch (e2) {}
        showToast('已改状态（离线缓存），网络恢复后自动同步');
      }
    }

    async function clearDone() {
      try {
        board = {
          orders: (board.orders || []).filter(function (o) { return o.status !== 'done'; }),
          updatedAt: new Date().toISOString(),
        };
        render();
        board = await clearDoneKitchenOrders();
        lastSig = orderSignature(board.orders);
        knownIds = new Set((board.orders || []).map(o => o.id));
        render();
        showToast('已清理完成订单');
      } catch (e) {
        showToast('清理失败，请重试');
      }
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(function () {
        // 页面在前台才刷，省流量也更稳
        if (document.hidden) return;
        refreshBoard(false);
      }, 3000);
    }

    async function openDish(id) {
      const lite = findDishLite(id) || { id, name: id };
      document.getElementById('kName').textContent = lite.name || id;
      document.getElementById('kTag').textContent = lite.tagline || '加载中…';
      document.getElementById('kTime').textContent = lite.time ? ('约 ' + lite.time + ' 分钟') : '';
      document.getElementById('kIng').innerHTML = '';
      document.getElementById('kSteps').innerHTML = '<li><span class="n">…</span><span>加载做法…</span></li>';
      document.getElementById('kTip').textContent = '';
      const img = document.getElementById('kImg');
      img.style.display = '';
      img.dataset.fb = '0';
      img.alt = lite.name || '';
      img.onerror = function () { onImgError(this, id, false); };
      img.src = imgOf(id, false);
      document.getElementById('detailMask').classList.add('open');
      document.body.style.overflow = 'hidden';

      try {
        const d = await loadDishDetail(id);
        document.getElementById('kName').textContent = d.name;
        document.getElementById('kTag').textContent = d.tagline || '';
        document.getElementById('kTime').textContent = '约 ' + d.time + ' 分钟';
        document.getElementById('kTip').textContent = d.tip || '按步骤慢慢做就好';
        document.getElementById('kIng').innerHTML = (d.ingredients || []).slice(0, 20)
          .map(x => '<span>' + x + '</span>').join('') || '<span>详见步骤</span>';
        const steps = dishSteps(d);
        document.getElementById('kSteps').innerHTML = steps.map((s, i) =>
          '<li><span class="n">' + (i + 1) + '</span><span>' + s + '</span></li>'
        ).join('') || '<li><span class="n">1</span><span>暂无分步</span></li>';
      } catch (e) {
        document.getElementById('kTag').textContent = '详情加载失败';
      }
    }

    function closeDetail(e) {
      if (e.target === document.getElementById('detailMask')) closeDetailDirect();
    }
    function closeDetailDirect() {
      document.getElementById('detailMask').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetailDirect();
    });

    // 进入立刻刷；每 3 秒自动刷；回到前台再刷
    refreshBoard(true);
    startPolling();
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden) refreshBoard(false);
    });
    window.addEventListener('focus', function () {
      refreshBoard(false);
    });
  </script>
</body>
</html>
