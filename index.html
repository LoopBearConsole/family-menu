<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>老刘小炒</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fff7ed', 100:'#ffedd5', 200:'#fed7aa', 400:'#fb923c', 500:'#f97316', 600:'#ea580c', 700:'#c2410c', 900:'#7c2d12' }
          },
          fontFamily: {
            display: ['"Noto Serif SC"', 'serif'],
            body: ['"Noto Sans SC"', '"PingFang SC"', '"Microsoft YaHei"', 'sans-serif']
          },
          boxShadow: {
            cart: '0 -8px 30px rgba(0,0,0,.12)',
            sheet: '0 25px 50px -12px rgba(0,0,0,.35)'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .font-display { font-family: 'Noto Serif SC', serif; }

    body { background: #faf6f1; }

    .dish-card {
      transition: transform .25s cubic-bezier(.4,0,.2,1), box-shadow .25s ease;
      cursor: pointer;
    }
    .dish-card:hover { transform: translateY(-3px); box-shadow: 0 16px 32px -12px rgba(124,45,18,.18); }
    .dish-card:active { transform: scale(.98); }
    .dish-card img { transition: transform .4s ease; }
    .dish-card:hover img { transform: scale(1.06); }

    .cat-btn { transition: all .18s ease; white-space: nowrap; }
    .cat-btn.active {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      box-shadow: 0 4px 14px rgba(249,115,22,.35);
      border-color: transparent;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease both; }

    /* 详情弹层 */
    .sheet-mask {
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .sheet-mask.open { opacity: 1; pointer-events: auto; }
    .sheet-panel {
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.32,.72,0,1);
    }
    @media (min-width: 640px) {
      .sheet-panel {
        transform: scale(.94) translateY(12px);
        opacity: 0;
        transition: transform .28s ease, opacity .28s ease;
      }
      .sheet-mask.open .sheet-panel {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }
    .sheet-mask.open .sheet-panel { transform: translateY(0); }

    /* 购物车抽屉 */
    .cart-drawer {
      transform: translateY(100%);
      transition: transform .32s cubic-bezier(.32,.72,0,1);
    }
    .cart-drawer.open { transform: translateY(0); }

    @keyframes bounce {
      0%,100% { transform: scale(1); }
      40% { transform: scale(1.25); }
      70% { transform: scale(.92); }
    }
    .badge-bounce { animation: bounce .35s ease; }

    @keyframes toastIn {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .toast-in { animation: toastIn .28s ease both; }

    .spice-dot { width: 8px; height: 8px; border-radius: 999px; background: #e5e7eb; }
    .spice-dot.on { background: #ef4444; }

    /* 底栏安全区 */
    .safe-bottom { padding-bottom: max(12px, env(safe-area-inset-bottom)); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #fdba74; border-radius: 4px; }

    .img-ph {
      background: linear-gradient(135deg, #fed7aa 0%, #fdba74 50%, #fb923c 100%);
    }
  </style>
</head>
<body class="min-h-screen pb-28 text-stone-800">

  <!-- Header -->
  <header class="relative overflow-hidden bg-gradient-to-br from-orange-500 via-orange-600 to-red-600 text-white">
    <div class="absolute inset-0 opacity-10"
      style="background-image:radial-gradient(circle at 20% 30%,#fff 1px,transparent 1px),radial-gradient(circle at 80% 70%,#fff 1px,transparent 1px);background-size:28px 28px;"></div>
    <div class="relative max-w-5xl mx-auto px-5 pt-12 pb-16 sm:pt-16 sm:pb-20 text-center">
      <p class="text-orange-100/90 text-xs tracking-[0.25em] mb-3 font-medium">LAO LIU · 家常小炒</p>
      <h1 class="font-display text-4xl sm:text-5xl md:text-6xl font-bold tracking-wide mb-3">老刘小炒</h1>
      <p class="text-orange-50/90 text-sm sm:text-base max-w-md mx-auto leading-relaxed">
        点开看做法 · 加入购物车 · 一键下单喊做饭
      </p>
      <div class="mt-6 flex flex-wrap justify-center gap-2 text-xs">
        <span class="bg-white/15 backdrop-blur px-3 py-1.5 rounded-full">41 道家常菜</span>
        <span class="bg-white/15 backdrop-blur px-3 py-1.5 rounded-full">无需下载 App</span>
        <span class="bg-white/15 backdrop-blur px-3 py-1.5 rounded-full">适合全家点菜</span>
      </div>
    </div>
    <svg class="absolute bottom-0 w-full h-8 text-[#faf6f1]" viewBox="0 0 1440 48" preserveAspectRatio="none" fill="currentColor">
      <path d="M0,24 C360,48 720,0 1080,24 C1260,36 1380,28 1440,24 L1440,48 L0,48 Z"/>
    </svg>
  </header>

  <!-- 分类 -->
  <nav class="sticky top-0 z-30 bg-[#faf6f1]/90 backdrop-blur-md border-b border-orange-100/80">
    <div class="max-w-5xl mx-auto px-3 py-3 overflow-x-auto">
      <div class="flex gap-2 min-w-max" id="categoryNav">
        <button class="cat-btn active px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="all">全部</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="pork">猪肉</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="chicken">鸡肉</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="beef">牛肉</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="seafood">鱼虾</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="tofu">豆腐</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="egg">鸡蛋</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="veggie">蔬菜</button>
        <button class="cat-btn px-4 py-2 rounded-full text-sm font-medium border border-orange-200 bg-white text-stone-600" data-cat="soup">汤羹</button>
      </div>
    </div>
  </nav>

  <!-- 菜品网格 -->
  <main class="max-w-5xl mx-auto px-3 sm:px-4 py-6" id="dishGrid"></main>

  <!-- 底部结算栏（仿外卖） -->
  <div class="fixed bottom-0 inset-x-0 z-40 safe-bottom">
    <div class="max-w-5xl mx-auto px-3 pb-2">
      <div class="bg-stone-900 text-white rounded-2xl shadow-cart flex items-center gap-3 px-3 py-2.5 sm:px-4">
        <button type="button" class="relative flex items-center justify-center w-12 h-12 -mt-5 bg-gradient-to-br from-orange-400 to-red-500 rounded-full shadow-lg shrink-0" onclick="toggleCart()" aria-label="打开购物车">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.3 2.3c-.4.4-.1 1.1.4 1.1H17M17 13v6a1 1 0 01-1 1H8a1 1 0 01-1-1v-6"/></svg>
          <span id="cartBadge" class="absolute -top-1 -right-1 min-w-[20px] h-5 px-1 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center hidden">0</span>
        </button>
        <div class="flex-1 min-w-0" onclick="toggleCart()">
          <p class="text-sm text-stone-300 truncate" id="cartSummary">还没选菜，点卡片看看吧</p>
          <p class="text-xs text-stone-500 mt-0.5">共 <span id="cartKinds">0</span> 种 · <span id="cartQty">0</span> 份</p>
        </div>
        <button type="button" id="orderBtn" disabled onclick="placeOrder()"
          class="shrink-0 bg-gradient-to-r from-orange-500 to-red-500 disabled:from-stone-600 disabled:to-stone-600 disabled:cursor-not-allowed text-white font-bold text-sm px-5 py-3 rounded-xl shadow-lg active:scale-95 transition">
          一键下单
        </button>
      </div>
    </div>
  </div>

  <!-- 购物车抽屉 -->
  <div id="cartMask" class="sheet-mask fixed inset-0 z-50 bg-black/45 backdrop-blur-[2px]" onclick="closeCart()"></div>
  <div id="cartDrawer" class="cart-drawer fixed bottom-0 inset-x-0 z-[51] max-w-lg mx-auto bg-white rounded-t-3xl shadow-sheet max-h-[75vh] flex flex-col">
    <div class="flex items-center justify-between px-5 pt-4 pb-3 border-b border-stone-100">
      <div>
        <h2 class="font-display text-lg font-bold text-stone-800">已选菜品</h2>
        <p class="text-xs text-stone-400 mt-0.5">和外面点外卖一样，加减份数再下单</p>
      </div>
      <div class="flex items-center gap-3">
        <button type="button" onclick="clearCart()" class="text-xs text-stone-400 hover:text-red-500 transition">清空</button>
        <button type="button" onclick="closeCart()" class="w-8 h-8 rounded-full bg-stone-100 text-stone-500 flex items-center justify-center text-lg leading-none">&times;</button>
      </div>
    </div>
    <div id="cartList" class="flex-1 overflow-y-auto px-4 py-3 space-y-2"></div>
    <div id="cartEmpty" class="hidden flex-1 flex flex-col items-center justify-center py-12 text-stone-400">
      <p class="text-4xl mb-3">🛒</p>
      <p class="text-sm">购物车是空的</p>
    </div>
    <div class="px-4 py-3 border-t border-stone-100 safe-bottom bg-white rounded-b-none">
      <button type="button" id="orderBtn2" disabled onclick="placeOrder()"
        class="w-full bg-gradient-to-r from-orange-500 to-red-500 disabled:from-stone-300 disabled:to-stone-300 text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[.98] transition">
        📣 一键下单 · 喊妈妈做饭
      </button>
    </div>
  </div>

  <!-- 菜品详情 -->
  <div id="detailMask" class="sheet-mask fixed inset-0 z-[60] bg-black/50 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-4" onclick="closeDetail(event)">
    <div class="sheet-panel bg-white w-full sm:max-w-lg sm:rounded-3xl rounded-t-3xl max-h-[92vh] overflow-y-auto shadow-sheet" onclick="event.stopPropagation()">
      <div class="relative">
        <img id="dImg" src="" alt="" class="w-full h-52 sm:h-60 object-cover img-ph" />
        <button type="button" onclick="closeDetailDirect()" class="absolute top-3 right-3 w-9 h-9 rounded-full bg-black/45 text-white flex items-center justify-center text-xl backdrop-blur-sm">&times;</button>
        <div class="absolute bottom-3 left-3 flex gap-2">
          <span id="dCat" class="px-2.5 py-1 rounded-full text-xs font-medium bg-white/95 shadow text-orange-700"></span>
          <span id="dTime" class="px-2.5 py-1 rounded-full text-xs font-medium bg-black/50 text-white backdrop-blur-sm"></span>
        </div>
      </div>
      <div class="p-5 sm:p-6">
        <div class="flex items-start justify-between gap-3 mb-2">
          <h2 id="dName" class="font-display text-2xl font-bold text-stone-800"></h2>
          <div class="flex items-center gap-1 shrink-0 pt-1" id="dSpice" title="辣度"></div>
        </div>
        <p id="dTagline" class="text-sm text-orange-600 font-medium mb-3"></p>
        <p id="dDesc" class="text-stone-600 text-sm leading-relaxed mb-4"></p>

        <div class="bg-orange-50/80 rounded-2xl p-4 mb-4 space-y-3">
          <div>
            <p class="text-xs font-semibold text-orange-700 mb-1.5">主要食材</p>
            <div id="dIngredients" class="flex flex-wrap gap-1.5"></div>
          </div>
          <div>
            <p class="text-xs font-semibold text-orange-700 mb-1.5">小贴士</p>
            <p id="dTip" class="text-sm text-stone-600 leading-relaxed"></p>
          </div>
        </div>

        <div class="flex gap-3">
          <button type="button" onclick="addFromDetail()" class="flex-1 bg-gradient-to-r from-orange-500 to-red-500 text-white py-3.5 rounded-xl font-bold shadow-md active:scale-[.98] transition">
            加入购物车
          </button>
          <button type="button" onclick="orderOneFromDetail()" class="px-5 py-3.5 rounded-xl font-bold border-2 border-orange-500 text-orange-600 hover:bg-orange-50 transition">
            只要这道
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 下单成功 -->
  <div id="orderOk" class="fixed inset-0 z-[70] flex items-center justify-center p-4 pointer-events-none opacity-0 transition-opacity duration-300">
    <div class="absolute inset-0 bg-black/40" onclick="closeOrderOk()"></div>
    <div id="orderOkCard" class="relative bg-white rounded-3xl shadow-2xl p-7 max-w-sm w-full text-center scale-90 transition-transform duration-300">
      <div class="text-5xl mb-3">👩‍🍳</div>
      <h2 class="font-display text-2xl font-bold text-stone-800 mb-2">下单成功！</h2>
      <p id="orderMsg" class="text-sm text-stone-500 mb-2 leading-relaxed"></p>
      <p class="text-orange-600 font-bold text-lg mb-1">📢 妈——做饭啦——！</p>
      <p class="text-xs text-stone-400 mb-5">订单已记在本机，可在下方查看最近下单</p>
      <button type="button" onclick="closeOrderOk()" class="bg-orange-500 hover:bg-orange-600 text-white px-10 py-2.5 rounded-full font-bold transition">好嘞</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed left-1/2 bottom-28 z-[80] pointer-events-none"></div>

  <!-- 最近订单 -->
  <section class="max-w-5xl mx-auto px-4 pb-8" id="historySection" style="display:none">
    <h3 class="font-display text-lg font-bold text-stone-700 mb-3">最近下单</h3>
    <div id="historyList" class="space-y-2"></div>
  </section>

  <!-- Footer + QR -->
  <section class="bg-stone-900 text-white mt-4 py-12">
    <div class="max-w-5xl mx-auto px-4 flex flex-col md:flex-row items-center justify-center gap-8">
      <div class="text-center md:text-left max-w-md">
        <h2 class="font-display text-2xl font-bold mb-2">扫一扫，菜单随身带</h2>
        <p class="text-stone-400 text-sm mb-3">手机扫码打开的是<strong class="text-stone-200">网址</strong>，不是电脑上的文件路径。</p>
        <p id="qrHint" class="text-amber-300/90 text-xs leading-relaxed mb-3"></p>
        <div class="flex flex-col sm:flex-row gap-2">
          <input id="qrUrlInput" type="url" placeholder="粘贴可访问的网址，如 GitHub Pages 链接"
            class="flex-1 min-w-0 rounded-xl bg-stone-800 border border-stone-600 text-stone-100 text-sm px-3 py-2.5 placeholder:text-stone-500 focus:outline-none focus:border-orange-400" />
          <button type="button" onclick="regenQR()"
            class="shrink-0 bg-orange-500 hover:bg-orange-600 text-white text-sm font-bold px-4 py-2.5 rounded-xl transition">
            生成二维码
          </button>
        </div>
        <p id="qrUrlLabel" class="text-stone-500 text-[11px] mt-2 break-all"></p>
      </div>
      <div class="bg-white p-3 rounded-2xl shadow-2xl min-w-[174px] min-h-[174px] flex items-center justify-center">
        <div id="qrcode"></div>
      </div>
    </div>
  </section>
  <footer class="bg-stone-950 text-stone-500 text-center py-5 text-sm">
    <p>老刘小炒 · 家的味道 · 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const dishes = [
      { id:'d1', name:'红烧肉', cat:'pork', catLabel:'猪肉', time:60, spice:0, tagline:'肥而不腻，入口即化',
        desc:'五花肉焯水后炒糖色，加生抽、老抽、八角、桂皮慢炖至软烂。色泽红亮，配白米饭绝了。',
        ingredients:['五花肉','冰糖','生抽','老抽','八角','桂皮','姜片'],
        tip:'选三层五花肉，大火收汁时多翻动，避免糊底。' },
      { id:'d2', name:'糖醋排骨', cat:'pork', catLabel:'猪肉', time:45, spice:0, tagline:'酸甜开胃，小朋友最爱',
        desc:'排骨焯水后炸至金黄，用糖、醋、番茄酱、酱油收汁裹匀。外酥里嫩，酸甜可口。',
        ingredients:['肋排','白糖','香醋','番茄酱','生抽','淀粉'],
        tip:'炸之前拍干水分，糖醋比例大约 1:1，按口味微调。' },
      { id:'d3', name:'回锅肉', cat:'pork', catLabel:'猪肉', time:30, spice:2, tagline:'川菜下饭之王',
        desc:'五花肉先煮后切片，配蒜苗和豆瓣酱爆炒。肉片微卷成「灯盏窝」，香辣下饭。',
        ingredients:['五花肉','蒜苗','郫县豆瓣','豆豉','青蒜'],
        tip:'肉要煮到七八成熟再切片，炒时大火快翻。' },
      { id:'d4', name:'鱼香肉丝', cat:'pork', catLabel:'猪肉', time:20, spice:1, tagline:'无鱼有鱼香',
        desc:'肉丝上浆滑油，配木耳、胡萝卜、青椒丝，鱼香汁一炒即成。酸甜微辣，经典家常。',
        ingredients:['猪里脊','木耳','胡萝卜','青椒','泡椒','糖','醋'],
        tip:'肉丝先用蛋清淀粉上浆，滑油后更嫩。' },
      { id:'d5', name:'青椒肉丝', cat:'pork', catLabel:'猪肉', time:15, spice:0, tagline:'十分钟快手下饭菜',
        desc:'肉丝腌好滑油，青椒丝爆炒，生抽蚝油调味。清爽不油腻。',
        ingredients:['猪肉丝','青椒','蒜','生抽','蚝油'],
        tip:'青椒后下锅，保持脆爽。' },
      { id:'d6', name:'木须肉', cat:'pork', catLabel:'猪肉', time:20, spice:0, tagline:'营养均衡的北方家常',
        desc:'肉丝、鸡蛋、木耳、黄花菜、黄瓜片同炒。色彩丰富，老少皆宜。',
        ingredients:['猪肉','鸡蛋','木耳','黄花菜','黄瓜'],
        tip:'鸡蛋先炒散盛出，最后回锅更蓬松。' },
      { id:'d7', name:'宫保鸡丁', cat:'chicken', catLabel:'鸡肉', time:25, spice:2, tagline:'花生酥脆，麻辣鲜香',
        desc:'鸡丁上浆滑油，干辣椒、花椒、花生米爆炒，糖醋酱油勾芡。',
        ingredients:['鸡胸肉','花生米','干辣椒','花椒','葱段','糖','醋'],
        tip:'花生最后下，避免回潮变软。' },
      { id:'d8', name:'可乐鸡翅', cat:'chicken', catLabel:'鸡肉', time:35, spice:0, tagline:'懒人必学甜香鸡翅',
        desc:'鸡翅煎至两面金黄，倒入可乐、酱油、姜片焖至收汁。甜咸融合，色泽诱人。',
        ingredients:['鸡翅','可乐','生抽','老抽','姜片'],
        tip:'用普通可乐，不要无糖款；收汁到浓稠即可。' },
      { id:'d9', name:'辣子鸡', cat:'chicken', catLabel:'鸡肉', time:30, spice:3, tagline:'在辣椒里找鸡肉',
        desc:'鸡块炸至干香，再与大量干辣椒、花椒翻炒。越嚼越香，重庆风味。',
        ingredients:['鸡腿肉','干辣椒','花椒','蒜','姜','料酒'],
        tip:'鸡块要炸干水分，口感才脆香。' },
      { id:'d10', name:'口水鸡', cat:'chicken', catLabel:'鸡肉', time:40, spice:2, tagline:'红油蒜香，光看就流口水',
        desc:'鸡腿煮熟冰镇斩块，淋上红油、蒜泥、花生碎调制的酱汁。麻辣鲜香。',

    // 资源路径：GitHub Pages 项目站必须带 /family-menu/ 前缀
    // 否则手机扫码打开无尾斜杠时，相对路径 images/xxx 会指到错误地址导致全无图
    const ASSET_BASE = (() => {
      const { protocol, hostname, pathname } = location;
      if (protocol === 'file:') return '';
      if (hostname.endsWith('github.io')) {
        const segs = pathname.split('/').filter(Boolean);
        // /family-menu 或 /family-menu/ 或 /family-menu/index.html
        if (segs.length >= 1) return '/' + segs[0] + '/';
      }
      // 其他托管：取当前目录
      if (pathname.endsWith('/')) return pathname;
      if (pathname.endsWith('.html')) return pathname.replace(/[^/]+$/, '');
      return pathname + '/';
    })();

    function imgOf(id) {
      // 加版本参数：换图后强制刷新缓存
      return `${ASSET_BASE}images/${id}.jpg?v=20260719b`;
    }

    let cart = JSON.parse(localStorage.getItem('home_menu_cart') || '{}');
    let currentDish = null;
    let activeCat = 'all';

    const grid = document.getElementById('dishGrid');

    function spiceHtml(n) {
      let h = '';
      for (let i = 1; i <= 3; i++) h += `<span class="spice-dot ${i <= n ? 'on' : ''}"></span>`;
      return h || '<span class="text-xs text-stone-400">不辣</span>';
    }

    function renderDishes(cat) {
      activeCat = cat;
      const list = cat === 'all' ? dishes : dishes.filter(d => d.cat === cat);
      if (!list.length) {
        grid.innerHTML = '<div class="text-center py-20 text-stone-400"><p class="text-5xl mb-3">🍽️</p><p>暂无此类菜品</p></div>';
        return;
      }
      const wrap = document.createElement('div');
      wrap.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4';
      list.forEach((d, i) => {
        const qty = cart[d.id]?.qty || 0;
        const card = document.createElement('article');
        card.className = 'dish-card bg-white rounded-2xl overflow-hidden shadow-sm border border-orange-50 fade-up';
        card.style.animationDelay = `${Math.min(i, 12) * 0.03}s`;
        card.innerHTML = `
          <div class="relative h-36 sm:h-40 overflow-hidden img-ph" onclick="openDetail('${d.id}')">
            <img src="${imgOf(d.id)}" alt="${d.name}" class="w-full h-full object-cover"
              loading="lazy" decoding="async"
              onerror="this.onerror=null;this.src='${ASSET_BASE}images/${d.id}.jpg';this.style.opacity=1" />
            <span class="absolute top-2 left-2 text-[10px] font-medium px-2 py-0.5 rounded-full bg-white/90 shadow text-orange-700">${d.catLabel}</span>
            ${qty ? `<span class="absolute top-2 right-2 min-w-[22px] h-[22px] px-1 rounded-full bg-red-500 text-white text-xs font-bold flex items-center justify-center">${qty}</span>` : ''}
          </div>
          <div class="p-3">
            <h3 class="font-display font-bold text-stone-800 text-sm sm:text-base truncate">${d.name}</h3>
            <p class="text-[11px] text-stone-400 mt-0.5 truncate">${d.tagline}</p>
            <div class="flex items-center justify-between mt-2.5">
              <span class="text-[11px] text-stone-400">约 ${d.time} 分钟</span>
              <button type="button" onclick="event.stopPropagation(); quickAdd('${d.id}')"
                class="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center text-lg font-bold shadow hover:bg-orange-600 active:scale-90 transition"
                aria-label="加入${d.name}">+</button>
            </div>
          </div>`;
        wrap.appendChild(card);
      });
      grid.innerHTML = '';
      grid.appendChild(wrap);
    }

    document.getElementById('categoryNav').addEventListener('click', e => {
      const btn = e.target.closest('button[data-cat]');
      if (!btn) return;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderDishes(btn.dataset.cat);
    });

    function findDish(id) { return dishes.find(d => d.id === id); }

    function openDetail(id) {
      const d = findDish(id);
      if (!d) return;
      currentDish = d;
      const img = document.getElementById('dImg');
      img.style.opacity = '1';
      img.src = imgOf(d.id);
      img.alt = d.name;
      img.onerror = function () {
        this.onerror = null;
        this.src = ASSET_BASE + 'images/' + d.id + '.jpg';
      };
      document.getElementById('dName').textContent = d.name;
      document.getElementById('dCat').textContent = d.catLabel;
      document.getElementById('dTime').textContent = `约 ${d.time} 分钟`;
      document.getElementById('dTagline').textContent = d.tagline;
      document.getElementById('dDesc').textContent = d.desc;
      document.getElementById('dTip').textContent = d.tip;
      document.getElementById('dSpice').innerHTML = spiceHtml(d.spice);
      document.getElementById('dIngredients').innerHTML = d.ingredients
        .map(x => `<span class="px-2.5 py-1 rounded-lg bg-white text-xs text-stone-600 border border-orange-100">${x}</span>`).join('');
      document.getElementById('detailMask').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail(e) {
      if (e.target === document.getElementById('detailMask')) closeDetailDirect();
    }
    function closeDetailDirect() {
      document.getElementById('detailMask').classList.remove('open');
      document.body.style.overflow = '';
      currentDish = null;
    }

    function saveCart() {
      localStorage.setItem('home_menu_cart', JSON.stringify(cart));
    }

    function quickAdd(id) {
      const d = findDish(id);
      if (!d) return;
      if (!cart[id]) cart[id] = { id, name: d.name, qty: 0 };
      cart[id].qty++;
      saveCart();
      updateCartUI();
      showToast(`已加入「${d.name}」`);
      bounceBadge();
    }

    function addFromDetail() {
      if (!currentDish) return;
      quickAdd(currentDish.id);
      closeDetailDirect();
    }

    function orderOneFromDetail() {
      if (!currentDish) return;
      cart = {};
      cart[currentDish.id] = { id: currentDish.id, name: currentDish.name, qty: 1 };
      saveCart();
      updateCartUI();
      closeDetailDirect();
      placeOrder();
    }

    function changeQty(id, delta) {
      if (!cart[id]) return;
      cart[id].qty += delta;
      if (cart[id].qty <= 0) delete cart[id];
      saveCart();
      updateCartUI();
      renderDishes(activeCat);
    }

    function clearCart() {
      cart = {};
      saveCart();
      updateCartUI();
      renderDishes(activeCat);
      showToast('购物车已清空');
    }

    function updateCartUI() {
      const items = Object.values(cart);
      const totalQty = items.reduce((s, i) => s + i.qty, 0);
      const kinds = items.length;

      const badge = document.getElementById('cartBadge');
      if (totalQty > 0) {
        badge.textContent = totalQty > 99 ? '99+' : totalQty;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      document.getElementById('cartKinds').textContent = kinds;
      document.getElementById('cartQty').textContent = totalQty;
      document.getElementById('cartSummary').textContent =
        totalQty ? items.map(i => `${i.name}×${i.qty}`).join('、') : '还没选菜，点卡片看看吧';

      const disabled = totalQty === 0;
      document.getElementById('orderBtn').disabled = disabled;
      document.getElementById('orderBtn2').disabled = disabled;

      const list = document.getElementById('cartList');
      const empty = document.getElementById('cartEmpty');
      if (!items.length) {
        list.innerHTML = '';
        empty.classList.remove('hidden');
        empty.classList.add('flex');
      } else {
        empty.classList.add('hidden');
        empty.classList.remove('flex');
        list.innerHTML = items.map(item => {
          const d = findDish(item.id);
          return `
            <div class="flex items-center gap-3 bg-stone-50 rounded-2xl p-2.5">
              <img src="${imgOf(item.id)}" alt="" class="w-14 h-14 rounded-xl object-cover img-ph" onerror="this.style.opacity=0.3" />
              <div class="flex-1 min-w-0">
                <p class="font-medium text-sm text-stone-800 truncate">${item.name}</p>
                <p class="text-[11px] text-stone-400 mt-0.5">${d ? '约 ' + d.time + ' 分钟' : ''}</p>
              </div>
              <div class="flex items-center gap-2">
                <button type="button" onclick="changeQty('${item.id}',-1)" class="w-7 h-7 rounded-full border border-stone-200 text-stone-600 flex items-center justify-center hover:bg-white">−</button>
                <span class="w-6 text-center text-sm font-bold">${item.qty}</span>
                <button type="button" onclick="changeQty('${item.id}',1)" class="w-7 h-7 rounded-full bg-orange-500 text-white flex items-center justify-center hover:bg-orange-600">+</button>
              </div>
            </div>`;
        }).join('');
      }
    }

    function toggleCart() {
      const drawer = document.getElementById('cartDrawer');
      const mask = document.getElementById('cartMask');
      if (drawer.classList.contains('open')) closeCart();
      else {
        drawer.classList.add('open');
        mask.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
    }
    function closeCart() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('cartMask').classList.remove('open');
      if (!document.getElementById('detailMask').classList.contains('open')) {
        document.body.style.overflow = '';
      }
    }

    function placeOrder() {
      const items = Object.values(cart);
      if (!items.length) {
        showToast('先选几道菜再下单哦');
        return;
      }
      const names = items.map(i => `${i.name} ×${i.qty}`).join('、');
      const totalMin = items.reduce((s, i) => {
        const d = findDish(i.id);
        return s + (d ? d.time * i.qty : 0);
      }, 0);

      // 保存历史
      const hist = JSON.parse(localStorage.getItem('home_menu_orders') || '[]');
      hist.unshift({
        time: new Date().toLocaleString('zh-CN'),
        items: names,
        count: items.reduce((s, i) => s + i.qty, 0)
      });
      localStorage.setItem('home_menu_orders', JSON.stringify(hist.slice(0, 10)));

      document.getElementById('orderMsg').textContent = `已点：${names}`;
      const ok = document.getElementById('orderOk');
      const card = document.getElementById('orderOkCard');
      ok.style.pointerEvents = 'auto';
      ok.classList.remove('opacity-0');
      ok.classList.add('opacity-100');
      card.classList.remove('scale-90');
      card.classList.add('scale-100');

      cart = {};
      saveCart();
      updateCartUI();
      closeCart();
      renderDishes(activeCat);
      renderHistory();

      // 尝试震动反馈
      if (navigator.vibrate) navigator.vibrate(40);
    }

    function closeOrderOk() {
      const ok = document.getElementById('orderOk');
      const card = document.getElementById('orderOkCard');
      ok.classList.add('opacity-0');
      ok.classList.remove('opacity-100');
      card.classList.add('scale-90');
      card.classList.remove('scale-100');
      setTimeout(() => { ok.style.pointerEvents = 'none'; }, 300);
    }

    function renderHistory() {
      const hist = JSON.parse(localStorage.getItem('home_menu_orders') || '[]');
      const sec = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      if (!hist.length) { sec.style.display = 'none'; return; }
      sec.style.display = 'block';
      list.innerHTML = hist.slice(0, 5).map(h => `
        <div class="bg-white rounded-xl border border-orange-50 px-4 py-3 text-sm">
          <div class="flex justify-between text-xs text-stone-400 mb-1">
            <span>${h.time}</span>
            <span>${h.count} 份</span>
          </div>
          <p class="text-stone-700 leading-relaxed">${h.items}</p>
        </div>`).join('');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerHTML = `<div class="toast-in bg-stone-900 text-white text-sm px-5 py-2.5 rounded-full shadow-lg whitespace-nowrap">${msg}</div>`;
      setTimeout(() => { t.innerHTML = ''; }, 1800);
    }

    function bounceBadge() {
      const b = document.getElementById('cartBadge');
      b.classList.remove('badge-bounce');
      void b.offsetWidth;
      b.classList.add('badge-bounce');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeDetailDirect();
        closeCart();
        closeOrderOk();
      }
    });

    // ----- 二维码 -----
    // 手机扫不了 file:///D:/... 这种电脑本地路径，必须是 http(s) 网址
    let qrInstance = null;

    function isHttpUrl(u) {
      return /^https?:\/\//i.test(u || '');
    }

    // 公网地址（GitHub Pages）——随时随地可扫
    const PUBLIC_MENU_URL = 'https://loopbearconsole.github.io/family-menu/';

    function resolveQRUrl() {
      const saved = (localStorage.getItem('home_menu_public_url') || '').trim();
      if (isHttpUrl(saved)) return saved;
      // 在线打开时用当前页；本地 file:// 时默认用已部署的公网地址
      if (isHttpUrl(location.href) && location.protocol !== 'file:') {
        return location.href.split('#')[0];
      }
      return PUBLIC_MENU_URL;
    }

    function renderQR(url) {
      const box = document.getElementById('qrcode');
      const hint = document.getElementById('qrHint');
      const label = document.getElementById('qrUrlLabel');
      const input = document.getElementById('qrUrlInput');

      box.innerHTML = '';
      qrInstance = null;

      if (!isHttpUrl(url)) {
        hint.innerHTML = '当前是电脑本地文件（file://），手机扫了也打不开。<br>请先部署到 GitHub Pages，或用同一 WiFi 下的局域网地址，把网址粘贴到上方再点「生成二维码」。';
        label.textContent = '尚未设置可访问网址';
        input.value = '';
        box.innerHTML = '<p class="text-stone-400 text-xs text-center px-2 leading-relaxed">请先填写<br>http 网址</p>';
        return;
      }

      if (location.protocol === 'file:') {
        hint.textContent = '已用你填写的公网/局域网地址生成二维码。手机需能打开这个网址（同一 WiFi 或已上线的 Pages）。';
      } else {
        hint.textContent = '手机与电脑需能访问下方网址（同 WiFi 局域网，或公网 GitHub Pages）。';
      }

      input.value = url;
      label.textContent = '扫码打开：' + url;
      qrInstance = new QRCode(box, {
        text: url,
        width: 150,
        height: 150,
        colorDark: '#1c1917',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    function regenQR() {
      const input = document.getElementById('qrUrlInput');
      let url = (input.value || '').trim();
      if (!url) {
        showToast('请先粘贴一个 http(s) 网址');
        return;
      }
      if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
      try {
        // 校验格式
        new URL(url);
      } catch {
        showToast('网址格式不对');
        return;
      }
      localStorage.setItem('home_menu_public_url', url);
      renderQR(url);
      showToast('二维码已更新');
    }

    // init
    renderDishes('all');
    updateCartUI();
    renderHistory();
    renderQR(resolveQRUrl());
  </script>
</body>
</html>
